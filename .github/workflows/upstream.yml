name: Upstream

# Only on pushes to main, tags, or workflow dispatches
on:
  push:
    branches:
    - main
    - dev
    paths:
      # Only run test and docker publish if some code have changed
      - 'src/titiler/xarray/**'
  workflow_dispatch:

jobs:
  test-upstream:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.9.*" 
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Test titiler.xarray
        working-directory: src/titiler/xarray
        run: |
          uv run --group test --with-requirements requirements-upstream.txt pytest
