name: Upstream

# Only on pushes to main, tags, or workflow dispatches
on:
  push:
    branches:
    - main
    - dev
    paths:
      # Only run test and docker publish if some code have changed
      - 'src/titiler/xarray/**'
  workflow_dispatch:

jobs:
  test-upstream:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.*" 
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Test titiler.xarray
        working-directory: src/titiler/xarray
        run: |
          uv run --group test --with-requirements requirements-upstream.txt pytest
