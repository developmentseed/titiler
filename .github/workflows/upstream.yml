name: Upstream

# Only on pushes to main, tags, or workflow dispatches
on:
  push:
    branches:
    - main
    - dev
    paths:
      # Only run test and docker publish if some code have changed
      - 'src/titiler/xarray/**'
  workflow_dispatch:

jobs:
  test-upstream:
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.*" 
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Test titiler.xarray
        working-directory: src/titiler/xarray
        run: |
          uv run --group test --with-requirements requirements-upstream.txt pytest
